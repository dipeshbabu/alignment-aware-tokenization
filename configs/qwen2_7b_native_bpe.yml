model_name: "Qwen/Qwen2-7B"
tokenizer_name: "tokenizers/native_bpe_qwen2_7b/hazard"
seed: 9172

precision: "bf16"
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
train:
  lr: 1.0e-4
  batch_size: 8
  steps: 1500
  warmup_steps: 100
drift:
  lambda: 5.0
  margin: 0.2
  layer: 16
  rank: 4
  probe_path: "probes/qwen2_7b_layer16.npy"
data:
  unlabeled_stream: "data/unlabeled/u_train.jsonl"
  anchors: "data/splits/stems_seed9172/anchors_train_stems.jsonl"
  neutrals: "data/splits/stems_seed9172/neutrals_train_stems.jsonl"
eval:
  u_dev_sample: 20000
