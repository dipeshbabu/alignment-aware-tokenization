model_name: "EleutherAI/pythia-410m"
tokenizer_name: "tokenizers/native_bpe_pythia410m/hazard"
seed: 9172

precision: "bf16"
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["query_key_value", "dense", "dense_h_to_4h", "dense_4h_to_h"]
train:
  lr: 2.0e-4
  batch_size: 64
  steps: 2000
  warmup_steps: 100
drift:
  lambda: 0.25
  margin: 0.2
  layer: 10
  rank: 4
  probe_path: "probes/pythia410m_layer10.npy"
data:
  unlabeled_stream: "data/unlabeled/u_train.jsonl"
  anchors: "data/splits/stems_seed9172/anchors_train_stems.jsonl"
  neutrals: "data/splits/stems_seed9172/neutrals_train_stems.jsonl"
eval:
  u_dev_sample: 20000
